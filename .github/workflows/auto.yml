name: auto

on:
  schedule:
    - cron: '13 0 * * *'   # 每天 UTC 00:13 运行
  workflow_dispatch:

jobs:
  auto_sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.9

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Check secrets
        run: |
          echo "准备运行脚本"
          echo "COOKIE is set: ${{ secrets.COOKIE != '' }}"
          echo "SK is set: ${{ secrets.SK != '' }}"
          echo "TOKEN is set: ${{ secrets.TOKEN != '' }}"

      - name: Working (sign)
        env:
          COOKIE: ${{ secrets.COOKIE }}
          SK: ${{ secrets.SK }}
          TOKEN: ${{ secrets.TOKEN }}
        run: |
          random_time=$(($RANDOM % 17))
          echo "等待 $[${random_time} + 1] 分钟后开始签到"
          for((i=1;i<=${random_time};i++))
          do
            echo "倒计时 $[${random_time}-$i+1] 分钟"
            sleep 1m
          done
          python auto_signV2.py

      # 始终运行的通知步骤，不依赖签到是否成功
      - name: Send notification to WeChat Work
        if: always()   # 无论前面的步骤成功或失败，都执行
        env:
          WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            STATUS_EMOJI="✅"
            STATUS_TEXT="成功"
          else
            STATUS_EMOJI="❌"
            STATUS_TEXT="失败"
          fi
          MESSAGE="${STATUS_EMOJI} 自动签到工作流 ${STATUS_TEXT}\n时间: $(date '+%Y-%m-%d %H:%M:%S')\n触发方式: ${{ github.event_name }}\n仓库: ${{ github.repository }}\n运行编号: ${{ github.run_id }}"
          curl -X POST -H "Content-Type: application/json" \
            -d "{\"msgtype\":\"text\",\"text\":{\"content\":\"${MESSAGE}\"}}" \
            "$WEBHOOK_URL"
